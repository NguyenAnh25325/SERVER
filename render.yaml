services:
  - type: web
    name: ai-server
    runtime: python
    plan: free
    buildCommand: |
      python -m pip install --upgrade pip setuptools wheel
      pip install --no-cache-dir -r requirements.txt
    startCommand: "gunicorn --bind 0.0.0.0:$PORT app:app --timeout 180 --workers 1"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: PORT
        value: "10000"
